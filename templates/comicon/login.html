<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Login – COMICON 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #fdf6e3, #ffe4b5);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 0 20px;
    }

    .navbar {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 12px;
      z-index: 1000;
    }

    .navbar a {
      background: #facc15;
      color: #1f2937;
      padding: 10px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: background 0.2s ease-in-out;
    }

    .navbar a:hover {
      background: #fde047;
    }

    .login-container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    h2 {
      color: #ef4444;
      font-size: 2em;
      margin-bottom: 30px;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    form p {
      margin-bottom: 20px;
      text-align: left;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 1em;
    }

    button {
      background: #1e40af;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s ease-in-out;
    }

    button:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>

  <!-- Pulsanti in alto a destra -->
  <div class="navbar">
    <a href="{% url 'landing_page' %}">Home</a>
    <a href="{% url 'registrazione' %}">Registrati</a>
    
  </div>

  <!-- Box Login centrato -->
  <div class="login-container">
    <h2>Login</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Accedi</button>
    </form>
  </div>

</body>
</html>
