<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Registrazione – COMICON 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #fdf6e3, #ffe4b5);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 20px;
        }

        .navbar {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 1000;
        }

        .navbar a {
            background: #facc15;
            color: #1f2937;
            padding: 10px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            transition: background 0.2s ease-in-out;
        }

        .navbar a:hover {
            background: #fde047;
        }

        .register-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            text-align: center;
            margin-top: 60px;
        }

        h1 {
            font-size: 2.4em;
            margin-bottom: 30px;
            color: #ef4444;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }

        form p {
            margin-bottom: 20px;
            text-align: left;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 1em;
            margin-bottom: 16px;
        }

        button {
            background: #1e40af;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s ease-in-out;
        }

        button:hover {
            background: #2563eb;
        }

        .error-list {
            color: #dc2626;
            margin-bottom: 16px;
            text-align: left;
            list-style: none;
            padding-left: 0;
        }
    </style>

    <script>
        function showPopup(msg) {
            alert(msg);
        }
    </script>
</head>
<body>

    <!-- Navbar in alto a destra (Home + Accedi) -->
    <div class="navbar">
        <a href="{% url 'landing_page' %}">Home</a>
        <a href="{% url 'login' %}">Accedi</a>
    </div>

    <!-- Container registrazione centrato -->
    <div class="register-container">
        <h1>Registrazione</h1>

        {% if messages %}
            <script>
                {% for message in messages %}
                    showPopup("{{ message|escapejs }}");
                {% endfor %}
            </script>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            {% if form.errors %}
                <ul class="error-list">
                {% for field, errors in form.errors.items %}
                    {% for error in errors %}
                        <li><strong>{{ field|capfirst }}</strong>: {{ error }}</li>
                    {% endfor %}
                {% endfor %}
                </ul>
            {% endif %}

            <button type="submit">Registrati</button>
        </form>
    </div>

</body>
</html>
